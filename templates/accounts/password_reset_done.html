{% extends 'base.html' %}

{% block title %}Check Your Email — VetProject{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-md p-8 text-center">

        <!-- Email icon -->
        <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-3">Check your email</h2>
        <p class="text-gray-500 text-sm mb-6">
            If an account exists with that email address, we've sent a
            password reset link. Check your inbox and spam folder.
        </p>

        <p class="text-gray-400 text-xs">
            The link expires in 1 hour.
        </p>

        <a href="{% url 'accounts:login' %}"
            class="inline-block mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-lg transition duration-200">
            Back to login
        </a>

    </div>
</div>
{% endblock %}
