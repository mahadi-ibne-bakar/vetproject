{% extends 'base.html' %}

{% block title %}My Profile — VetProject{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">My Profile</h1>
    <div class="bg-white rounded-2xl shadow-md p-6">
        <p class="text-gray-600"><span class="font-medium">Name:</span> {{ user.get_full_name }}</p>
        <p class="text-gray-600 mt-2"><span class="font-medium">Email:</span> {{ user.email }}</p>
        <p class="text-gray-600 mt-2"><span class="font-medium">Phone:</span> {{ user.phone_number }}</p>
        <p class="text-gray-600 mt-2"><span class="font-medium">Member since:</span> {{ user.created_at|date:"F j, Y" }}</p>
    </div>
</div>
{% endblock %}
