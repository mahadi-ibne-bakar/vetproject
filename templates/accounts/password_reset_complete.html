{% extends 'base.html' %}
{% block title %}Password Reset Complete — VetProject{% endblock %}

{% block content %}
<div style="max-width: 440px; margin: 0 auto; padding: 24px 0;">
    <div class="card" style="padding: 32px; text-align:center;">

        <div style="width:64px; height:64px; background:#DCFCE7;
                    border-radius:var(--md-shape-full); display:flex; align-items:center;
                    justify-content:center; margin: 0 auto 20px;">
            <span class="ms lg filled" style="color:#16A34A;">check_circle</span>
        </div>

        <h1 style="font-size:1.6rem; font-weight:800; margin:0 0 10px;">Password updated</h1>
        <p style="color:var(--md-on-surface-variant); font-size:0.9rem; line-height:1.6; margin:0 0 24px;">
            Your password has been successfully updated.
            You can now sign in with your new password.
        </p>

        <a href="{% url 'accounts:login' %}" class="btn btn-filled ripple" style="width:100%;">
            <span class="ms sm">login</span>
            Sign in
        </a>

    </div>
</div>
{% endblock %}
