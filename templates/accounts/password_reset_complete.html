{% extends 'base.html' %}

{% block title %}Password Reset Complete — VetProject{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-md p-8 text-center">

        <!-- Checkmark icon -->
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-3">Password reset complete</h2>
        <p class="text-gray-500 text-sm mb-6">
            Your password has been successfully updated.
            You can now sign in with your new password.
        </p>

        <a href="{% url 'accounts:login' %}"
            class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-lg transition duration-200">
            Sign in
        </a>

    </div>
</div>
{% endblock %}
